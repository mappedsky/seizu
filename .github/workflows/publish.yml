name: Publish release artifacts

on:
  push:
    branches:
      - master
    tags:
      - "v*"
      - "server-v*"
      - "cli-v*"
      - "dev-v*"
      - "server-dev-v*"
      - "cli-dev-v*"
  workflow_dispatch: {}

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  publish-server-package:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/server-v') ||
      startsWith(github.ref, 'refs/tags/dev-v') ||
      startsWith(github.ref, 'refs/tags/server-dev-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/seizu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
      - name: Derive package version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          dev_release=false

          case "$tag" in
            server-dev-v*)
              version="${tag#server-dev-v}"
              dev_release=true
              ;;
            server-v*)
              version="${tag#server-v}"
              ;;
            dev-v*)
              version="${tag#dev-v}"
              dev_release=true
              ;;
            v*)
              version="${tag#v}"
              ;;
            *)
              echo "::error::Unsupported server release tag: $tag"
              exit 1
              ;;
          esac

          if [[ "$dev_release" == "true" && "$version" != *.dev* ]]; then
            echo "::error::Development release tags must resolve to a PEP 440 dev version such as 3.1.0.dev1"
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build frontend
        run: |
          bun install
          bun run build
      - name: Build server package
        run: |
          uv version "${{ steps.version.outputs.version }}"
          uv build --package seizu --wheel
      - name: Publish server package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  publish-cli-package:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/cli-v') ||
      startsWith(github.ref, 'refs/tags/dev-v') ||
      startsWith(github.ref, 'refs/tags/cli-dev-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/seizu-cli
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - name: Derive package version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          dev_release=false

          case "$tag" in
            cli-dev-v*)
              version="${tag#cli-dev-v}"
              dev_release=true
              ;;
            cli-v*)
              version="${tag#cli-v}"
              ;;
            dev-v*)
              version="${tag#dev-v}"
              dev_release=true
              ;;
            v*)
              version="${tag#v}"
              ;;
            *)
              echo "::error::Unsupported CLI release tag: $tag"
              exit 1
              ;;
          esac

          if [[ "$dev_release" == "true" && "$version" != *.dev* ]]; then
            echo "::error::Development release tags must resolve to a PEP 440 dev version such as 3.1.0.dev1"
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build CLI package
        run: |
          uv version --project packages/seizu-cli "${{ steps.version.outputs.version }}"
          uv build --package seizu-cli --wheel
      - name: Publish CLI package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  build-and-publish-to-ghcr:
    if: >-
      github.event_name != 'push' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/server-v') ||
      startsWith(github.ref, 'refs/tags/dev-v') ||
      startsWith(github.ref, 'refs/tags/server-dev-v')
    permissions:
      contents: read
      packages: write
    name: Build and publish Docker image to GitHub Container Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=match,pattern=v(.*),group=1
            type=match,pattern=server-v(.*),group=1
            type=match,pattern=dev-v(.*),group=1
            type=match,pattern=server-dev-v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          file: Dockerfile
          context: .
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
