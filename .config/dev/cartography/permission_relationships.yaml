# Default permission relationships from Cartography 0.139.0.
- target_label: S3Bucket
  permissions:
  - S3:GetObject
  relationship_name: CAN_READ
- target_label: S3Bucket
  permissions:
  - S3:PutObject
  relationship_name: CAN_WRITE
- target_label: DynamoDBTable
  permissions:
  - dynamodb:BatchGetItem
  - dynamodb:GetItem
  - dynamodb:GetRecords
  - dynamodb:Query
  - dynamodb:Scan
  relationship_name: CAN_QUERY
- target_label: DynamoDBTable
  permissions:
  - dynamodb:PutItem
  - dynamodb:UpdateItem
  - dynamodb:DeleteItem
  - dynamodb:BatchWriteItem
  relationship_name: CAN_WRITE
- target_label: SecretsManagerSecret
  permissions:
  - secretsmanager:GetSecretValue
  relationship_name: GET_SECRET
- target_label: RedshiftCluster
  permissions:
  - redshift:*
  - redshift:CreateClusterUser
  - redshift:GetClusterCredentials
  - redshift:JoinGroup
  relationship_name: CAN_ADMINISTER
- target_label: RDSInstance
  permissions:
  - rds-db:connect
  relationship_name: CAN_QUERY
- target_label: RDSInstance
  permissions:
  - rds:*
  - rds:ModifyDBInstance
  - rds:DeleteDBInstance
  - rds:RebootDBInstance
  - rds:StopDBInstance
  - rds:StartDBInstance
  relationship_name: CAN_ADMINISTER
- target_label: ECSTask
  permissions:
  - ecs:ExecuteCommand
  relationship_name: CAN_EXECUTE_COMMAND
- target_label: AWSRole
  permissions:
  - iam:PassRole
  relationship_name: CAN_PASS_ROLE
- target_label: CloudFormationStack
  permissions:
  - cloudformation:UpdateStack
  relationship_name: CAN_EXEC
- target_label: EC2Instance
  permissions:
  - ssm:StartSession
  relationship_name: CAN_START_SESSION
  target_precondition:
    related_label: SSMInstanceInformation
    relationship: HAS_INFORMATION
    direction: outgoing
